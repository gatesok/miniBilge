name: 'Deploy to Cloud Run from Source'

on:
  push:
    branches:
      - 'main'

env:
  PROJECT_ID: 'minibilge'
  REGION: 'us-central1'
  SERVICE: 'minibilge-api'

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/465589060611/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: '465589060611-compute@developer.gserviceaccount.com'
          project_id: 'minibilge'

      - name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          source: './backend'

      - name: 'Show output'
        run: |-
          echo ${{ steps.deploy.outputs.url }}
