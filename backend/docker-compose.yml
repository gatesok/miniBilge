version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: minibilge_postgres
    environment:
      POSTGRES_DB: minibilge_db
      POSTGRES_USER: minibilge_user
      POSTGRES_PASSWORD: Dev123!@#
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - minibilge_network

volumes:
  postgres_data:

networks:
  minibilge_network:
    driver: bridge
